appId: com.onedown.mobile
name: "04 - Story 1.3 card stack: add tasks, see stack, swipe through"
onFlowStart:
  - runFlow: shared/launch.yaml
---

# Add first task
- tapOn: "Add task"
- waitForAnimationToEnd
- tapOn: "Task title"
- inputText: "First smoke task"
- tapOn: "Save task"
- extendedWaitUntil:
    notVisible: "First smoke task"
    timeout: 5000

# Add second task
- tapOn: "Task title"
- inputText: "Second smoke task"
- tapOn: "Save task"
- extendedWaitUntil:
    notVisible: "Second smoke task"
    timeout: 5000

# Close the sheet
- tapOn: "Close add task"
- waitForAnimationToEnd

# Verify card stack is visible with the top card
- extendedWaitUntil:
    visible: "Top card"
    timeout: 10000

# Verify first card is shown (curation sorts by newest first)
- assertVisible: "Second smoke task"

# Swipe the top card off to the left
- swipe:
    start: "50%, 41%"
    end: "5%, 41%"
    duration: 300

# Wait for animation and verify next card appears
- extendedWaitUntil:
    visible: "First smoke task"
    timeout: 5000
- assertVisible: "First smoke task"

# Swipe the last card away to the right
- swipe:
    start: "50%, 41%"
    end: "95%, 41%"
    duration: 300

# Verify empty state appears after all cards swiped
- extendedWaitUntil:
    visible: "No tasks yet"
    timeout: 5000
- assertVisible: "No tasks yet"

# Check for any uncaught errors
- assertNotVisible:
    text: "Unhandled"
- assertNotVisible:
    text: "uncaught"
- assertNotVisible:
    text: "error occurred"
